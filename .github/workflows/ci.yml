name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy (if Python files exist)
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          has_python = any(p.suffix == ".py" for p in Path(".").rglob("*.py"))
          if not has_python:
              print("No Python files found; skipping mypy.")
              sys.exit(0)

          result = subprocess.run(["mypy", "."])
          sys.exit(result.returncode)
          PY

      - name: Pytest (if tests exist)
        shell: bash
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests directory found; skipping pytest."
          fi
